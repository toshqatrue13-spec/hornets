<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Dark background -->
  <rect width="32" height="32" rx="6" fill="#111"/>

  <!-- Wings -->
  <ellipse cx="10" cy="12" rx="8" ry="4" fill="white" opacity="0.7" transform="rotate(-25 10 12)"/>
  <ellipse cx="22" cy="12" rx="8" ry="4" fill="white" opacity="0.7" transform="rotate(25 22 12)"/>

  <!-- Body stripes -->
  <ellipse cx="16" cy="20" rx="6" ry="8" fill="#F7A800"/>
  <rect x="10" y="17" width="12" height="2.5" rx="1" fill="#111" opacity="0.7"/>
  <rect x="10" y="21" width="12" height="2.5" rx="1" fill="#111" opacity="0.7"/>

  <!-- Head -->
  <circle cx="16" cy="11" r="5" fill="#F7A800"/>

  <!-- Eyes -->
  <circle cx="14" cy="10.5" r="1.5" fill="#111"/>
  <circle cx="18" cy="10.5" r="1.5" fill="#111"/>
  <circle cx="14.5" cy="10" r="0.5" fill="white"/>
  <circle cx="18.5" cy="10" r="0.5" fill="white"/>

  <!-- Antennae -->
  <line x1="14" y1="7" x2="11" y2="3" stroke="#F7A800" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="18" y1="7" x2="21" y2="3" stroke="#F7A800" stroke-width="1.5" stroke-linecap="round"/>
  <circle cx="11" cy="3" r="1.2" fill="#F7A800"/>
  <circle cx="21" cy="3" r="1.2" fill="#F7A800"/>

  <!-- Stinger -->
  <path d="M14 28 Q16 31 18 28" fill="#F7A800" stroke="#F7A800" stroke-width="0.5"/>
</svg>
